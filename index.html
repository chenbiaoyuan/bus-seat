<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>遊覽車雲端選位</title>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxh95uyAG8fpZVxaL91CaFfwt6VBXk-mRXbMzWaYHL0J3pThei0tHoVjIFCl0p27jSx/exec";
  </script>

  <style>
    body {
      margin: 0;
      background: #f2f2f2;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
    }

    .app {
      max-width: 560px;
      margin: 0 auto;
      padding: 10px;
      box-sizing: border-box;
    }

    .header {
      text-align: center;
      background: white;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
    }

    h2 {
      margin: 0 0 8px;
      font-size: 22px;
      user-select: none;
    }

    #status-text {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
    }

    #round-box {
      font-size: 17px;
      font-weight: bold;
      margin: 6px 0;
    }

    #count-box {
      font-size: 15px;
      margin-bottom: 8px;
    }

    .order-panel {
      background: #fff8e1;
      border-radius: 10px;
      padding: 8px;
      margin: 8px 0;
      text-align: left;
    }

    .panel-title {
      font-weight: bold;
      color: #333;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .panel-title.next {
      margin-top: 8px;
    }

    #current-list,
    #next-list {
      font-size: 14px;
      line-height: 1.6;
    }

    .person {
      display: inline-block;
      background: white;
      border: 1px solid #e0d7b5;
      border-radius: 999px;
      padding: 4px 8px;
      margin: 3px;
    }

    .person.done {
      background: #e8f5e9;
      border-color: #81c784;
    }

    .notice {
      font-size: 14px;
      color: #444;
      background: #e8f5e9;
      padding: 9px;
      border-radius: 8px;
      margin: 8px 0;
      line-height: 1.6;
    }

    .toolbar button,
    .admin-panel button {
      border: none;
      background: #333;
      color: white;
      border-radius: 8px;
      padding: 8px 10px;
      margin: 3px;
      cursor: pointer;
      font-size: 13px;
    }

    .admin-panel {
      display: none;
      background: #f3e5f5;
      border-radius: 10px;
      padding: 8px;
      margin-top: 8px;
    }

    .admin-title {
      font-weight: bold;
      margin-bottom: 5px;
    }

    #bus-container {
      display: grid;
      grid-template-columns: 70px 58px 58px 48px 58px 70px;
      gap: 0;
      background: #fff;
      border: 3px solid #222;
      border-radius: 8px;
      overflow: hidden;
      opacity: .45;
      pointer-events: none;
      box-shadow: 0 4px 15px rgba(0, 0, 0, .12);
    }

    #bus-container.ready {
      opacity: 1;
      pointer-events: auto;
    }

    .cell {
      min-height: 46px;
      border-right: 1px solid #444;
      border-bottom: 1px solid #444;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      text-align: center;
      font-size: 13px;
      background: white;
    }

    .label {
      font-weight: bold;
      color: #333;
      background: #fafafa;
    }

    .seat {
      cursor: pointer;
      font-weight: bold;
      background: #fff;
    }

    .seat:hover {
      background: #e3f2fd;
    }

    .seat.occupied {
      background: #4CAF50 !important;
      color: white;
    }

    .seat.pending {
      opacity: .5;
      pointer-events: none;
    }

    .tv {
      color: #d32f2f;
      font-weight: bold;
      background: #fff5f5;
    }

    .door {
      color: #d32f2f;
      font-weight: bold;
      background: #fff8f8;
    }

    .aisle {
      writing-mode: vertical-rl;
      letter-spacing: 8px;
      font-weight: bold;
      color: #111;
      background: #fff;
    }

    .empty {
      background: #fff;
    }

    .num-hint {
      position: absolute;
      top: 2px;
      left: 4px;
      font-size: 10px;
      color: #999;
    }

    .name-text {
      font-size: 13px;
      font-weight: bold;
      padding: 4px;
      word-break: break-all;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 12px;
      font-size: 13px;
      margin-top: 10px;
    }

    .box {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 1px solid #444;
      vertical-align: middle;
      margin-right: 4px;
    }

    .empty-box {
      background: white;
    }

    .occupied-box {
      background: #4CAF50;
    }

    .open-box {
      background: #fff8e1;
    }
  </style>
</head>

<body>

  <div class="app">

    <div class="header">
      <h2>🚌 遊覽車雲端選位</h2>

      <div id="status-text">正在同步資料...</div>

      <div id="round-box">目前開放中...</div>

      <div id="count-box">已選 0 位｜剩餘 0 位</div>

      <div class="order-panel">
        <div class="panel-title">✅ 目前可選名單</div>
        <div id="current-list"></div>

        <div class="panel-title next">⏳ 下一輪準備名單</div>
        <div id="next-list"></div>
      </div>

      <div class="notice">
        請直接輸入您的姓名選位。<br>
        若要更換座位，直接點新的空位即可。<br>
        家人或同行者可依照上方名單順序一起準備。
      </div>

      <div class="toolbar">
        <button onclick="loadSeats()">手動刷新</button>
      </div>
    </div>

    <div id="bus-container"></div>

  </div>

  <script>
    document.getElementById("status-text").innerText =
      "✅ Netlify 已成功載入";

    document.getElementById("round-box").innerText =
      "目前第 1 輪｜開放順序 1～2";

    document.getElementById("count-box").innerText =
      "已選 0 位｜剩餘 33 位";
  </script>

</body>

</html>
