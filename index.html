<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遊覽車雲端選位</title>

<style>
body{margin:0;background:#f2f2f2;font-family:"Microsoft JhengHei",Arial,sans-serif;}
.app{max-width:560px;margin:0 auto;padding:10px;box-sizing:border-box;}
.header{text-align:center;background:white;padding:12px;border-radius:12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
h2{margin:0 0 8px;font-size:22px;}
#status-text{font-size:13px;color:#666;margin-bottom:4px;}
#round-box{font-size:17px;font-weight:bold;margin:6px 0;}
#count-box{font-size:15px;margin-bottom:8px;}
.order-panel{background:#fff8e1;border-radius:10px;padding:8px;margin:8px 0;text-align:left;}
.panel-title{font-weight:bold;margin-bottom:5px;}
.notice{font-size:14px;color:#444;background:#e8f5e9;padding:9px;border-radius:8px;margin:8px 0;line-height:1.6;}
.toolbar button{border:none;background:#333;color:white;border-radius:8px;padding:10px 14px;margin:3px;font-size:14px;}
#bus-container{display:grid;grid-template-columns:70px 58px 58px 48px 58px 70px;background:#fff;border:3px solid #222;border-radius:8px;overflow:hidden;margin-top:10px;}
.cell{min-height:46px;border-right:1px solid #444;border-bottom:1px solid #444;display:flex;align-items:center;justify-content:center;position:relative;text-align:center;font-size:13px;box-sizing:border-box;}
.label{background:#fafafa;font-weight:bold;}
.seat{background:white;cursor:pointer;font-weight:bold;}
.seat:hover{background:#e3f2fd;}
.seat.occupied{background:#4CAF50;color:white;}
.tv{background:#fff5f5;color:#d32f2f;font-weight:bold;}
.door{background:#fff8f8;color:#d32f2f;font-weight:bold;}
.aisle{writing-mode:vertical-rl;letter-spacing:8px;font-weight:bold;}
.empty{background:white;}
.num-hint{position:absolute;top:2px;left:4px;font-size:10px;color:#999;}
.name-text{font-size:13px;font-weight:bold;padding:4px;}
.person{display:inline-block;background:white;border:1px solid #ddd;border-radius:999px;padding:4px 8px;margin:3px;}
</style>
</head>

<body>
<div class="app">
  <div class="header">
    <h2>🚌 遊覽車雲端選位</h2>
    <div id="status-text">正在同步資料...</div>
    <div id="round-box">目前開放中...</div>
    <div id="count-box">已選 0 位｜剩餘 0 位</div>

    <div class="order-panel">
      <div class="panel-title">✅ 目前可選名單</div>
      <div id="current-list"></div>
      <div class="panel-title">⏳ 下一輪準備名單</div>
      <div id="next-list"></div>
    </div>

    <div class="notice">
      請直接輸入您的姓名選位。<br>
      若要更換座位，直接點新的空位即可。<br>
      家人或同行者可依照上方名單順序一起準備。
    </div>

    <div class="toolbar">
      <button onclick="loadSeats()">手動刷新</button>
    </div>
  </div>

  <div id="bus-container"></div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxh95uyAG8fpZVxaL91CaFfwt6VBXk-mRXbMzWaYHL0J3pThei0tHoVjIFCl0p27jSx/exec";
let latestData=null;

const layout=[
{t:'l',v:'駕駛邊'},{t:'tv',v:'大電視',span:2},{t:'e'},{t:'e'},{t:'e'},
{t:'l',v:'第一排'},{t:'s',v:'①',id:'s11'},{t:'s',v:'②',id:'s12'},{t:'g',v:'走道'},{t:'e'},{t:'e'},
{t:'e'},{t:'e'},{t:'e'},{t:'g',v:'走道'},{t:'d',v:'前門'},{t:'e'},
{t:'l',v:'第二排'},{t:'s',v:'①',id:'s21'},{t:'s',v:'②',id:'s22'},{t:'g',v:'走道'},{t:'l',v:'領隊'},{t:'l',v:'第三排'},
{t:'l',v:'第三排'},{t:'s',v:'①',id:'s31'},{t:'s',v:'②',id:'s32'},{t:'g',v:'走道'},{t:'e'},{t:'e'},
{t:'e'},{t:'tv',v:'小電視',span:2},{t:'g',v:'走道'},{t:'s',v:'③',id:'s43'},{t:'l',v:'第四排'},
{t:'l',v:'第四排'},{t:'s',v:'①',id:'s41'},{t:'s',v:'②',id:'s42'},{t:'g',v:'走道'},{t:'e'},{t:'e'},
{t:'l',v:'第五排'},{t:'s',v:'①',id:'s51'},{t:'s',v:'②',id:'s52'},{t:'g',v:'走道'},{t:'s',v:'③',id:'s53'},{t:'l',v:'第五排'},
{t:'e'},{t:'e'},{t:'e'},{t:'g',v:'走道'},{t:'e'},{t:'e'},
{t:'l',v:'第六排'},{t:'s',v:'①',id:'s61'},{t:'s',v:'②',id:'s62'},{t:'g',v:'走道'},{t:'s',v:'③',id:'s63'},{t:'l',v:'第六排'},
{t:'d',v:'緊急出口'},{t:'tv',v:'小電視',span:2},{t:'g',v:'走道'},{t:'s',v:'③',id:'s73'},{t:'l',v:'第七排'},
{t:'l',v:'第七排'},{t:'s',v:'①',id:'s71'},{t:'s',v:'②',id:'s72'},{t:'g',v:'走道'},{t:'e'},{t:'e'},
{t:'l',v:'第八排'},{t:'s',v:'①',id:'s81'},{t:'s',v:'②',id:'s82'},{t:'g',v:'走道'},{t:'d',v:'後門'},{t:'e'},
{t:'l',v:'第九排'},{t:'s',v:'①',id:'s91'},{t:'s',v:'②',id:'s92'},{t:'g',v:'走道'},{t:'tv',v:'小電視'},{t:'e'},
{t:'e'},{t:'tv',v:'小電視',span:2},{t:'g',v:'走道'},{t:'s',v:'③',id:'s93'},{t:'l',v:'第九排'},
{t:'l',v:'第十排'},{t:'s',v:'①',id:'s101'},{t:'s',v:'②',id:'s102'},{t:'g',v:'走道'},{t:'s',v:'③',id:'s103'},{t:'l',v:'第十排'},
{t:'l',v:'第十一排'},{t:'s',v:'①',id:'s111'},{t:'s',v:'②',id:'s112'},{t:'g',v:'走道'},{t:'s',v:'③',id:'s113'},{t:'l',v:'第十一排'},
{t:'l',v:'第十二排'},{t:'s',v:'①',id:'s121'},{t:'s',v:'②',id:'s122'},{t:'s',v:'③',id:'s123'},{t:'s',v:'④',id:'s124'},{t:'e'}
];

function jsonp(params){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Date.now()+"_"+Math.floor(Math.random()*9999);
    params.callback=cb;
    const script=document.createElement("script");
    window[cb]=data=>{resolve(data);delete window[cb];script.remove();};
    script.onerror=()=>{reject();delete window[cb];script.remove();};
    script.src=API_URL+"?"+new URLSearchParams(params).toString();
    document.body.appendChild(script);
  });
}

function renderPeople(list){
  if(!list||list.length===0)return"尚無名單";
  return list.map(p=>{
    const group=p.group?`｜${p.group}`:"";
    const seat=p.seat?`｜${p.seat}`:"";
    return `<span class="person">${p.order}. ${p.name}${group}${seat}</span>`;
  }).join("");
}

async function loadSeats(){
  try{
    const data=await jsonp({action:"list"});
    latestData=data;

    document.querySelectorAll(".seat").forEach(seat=>{
      seat.classList.remove("occupied");
      seat.querySelector(".name-text").innerText="";
    });

    data.seats.forEach(item=>{
      const seat=document.querySelector(`[data-id="${item.id}"]`);
      if(!seat)return;
      if(item.name){
        seat.classList.add("occupied");
        seat.querySelector(".name-text").innerText=item.name;
      }
    });

    document.getElementById("current-list").innerHTML=renderPeople(data.currentPassengers);
    document.getElementById("next-list").innerHTML=renderPeople(data.nextPassengers);
    document.getElementById("count-box").innerText=`已選 ${data.occupiedSeats} 位｜剩餘 ${data.remainingSeats} 位`;
    document.getElementById("round-box").innerText=`目前第 ${data.settings.currentStep} 輪｜開放順序 ${data.settings.start}～${data.settings.end}`;
    document.getElementById("status-text").innerText=`✅ 已同步｜${data.updatedAt||""}`;

  }catch(err){
    document.getElementById("status-text").innerText="❌ 連線失敗";
  }
}

function getSeatLabel(id){
  if(!latestData||!latestData.seats)return id;
  const seat=latestData.seats.find(s=>s.id===id);
  return seat?seat.label:id;
}

async function clickSeat(id){
  const seat=document.querySelector(`[data-id="${id}"]`);
  if(!seat)return;

  if(seat.classList.contains("occupied")){
    const currentName=seat.querySelector(".name-text").innerText;
    alert(`這個座位目前是：${currentName}`);
    return;
  }

  const seatLabel=getSeatLabel(id);
  const name=prompt(`你選擇的是 ${seatLabel}\n請輸入您的姓名：`);
  if(!name)return;

  const cleanName=name.trim();

  const confirmPick=confirm(`${cleanName} 您好\n\n確認選擇 ${seatLabel} 嗎？`);
  if(!confirmPick)return;

  const result=await jsonp({action:"reserve",id,name:cleanName});

  if(result.status==="success"){
    alert(`${result.name} 選位成功：${result.seat}`);
  }else{
    alert(result.message||"選位失敗");
  }

  loadSeats();
}

const container=document.getElementById("bus-container");

layout.forEach(item=>{
  const div=document.createElement("div");

  div.className="cell "+(
    item.t==="s"?"seat":
    item.t==="l"?"label":
    item.t==="tv"?"tv":
    item.t==="d"?"door":
    item.t==="g"?"aisle":"empty"
  );

  if(item.span)div.style.gridColumn="span "+item.span;

  if(item.t==="s"){
    div.setAttribute("data-id",item.id);
    div.innerHTML=`<span class="num-hint">${item.v}</span><span class="name-text"></span>`;
    div.onclick=()=>clickSeat(item.id);
  }else{
    div.innerText=item.v||"";
  }

  container.appendChild(div);
});

loadSeats();
setInterval(loadSeats,5000);
</script>

</body>
</html>
