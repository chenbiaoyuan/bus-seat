<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> 遊覽車雲端選位 </title>
  <script>
    // 💡 已自動載入您最新的 GAS 部署網址
    const API_URL = "https://script.google.com/macros/s/AKfycbxh95uyAG8fpZVxaL91CaFfwt6VBXk-mRXbMzWaYHL0J3pThei0tHoVjIFCl0p27jSx/exec";
  </script>
  <style>
    body {
      margin: 0;
      background: #f2f2f2;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
    }
    .app {
      max-width: 560px;
      margin: 0 auto;
      padding: 10px;
      box-sizing: border-box;
    }
    .header {
      text-align: center;
      background: white;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
    }
    h2 {
      margin: 0 0 8px;
      font-size: 22px;
      user-select: none;
      cursor: pointer;
    }
    #status-text {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
    }
    #round-box {
      font-size: 17px;
      font-weight: bold;
      margin: 6px 0;
    }
    #count-box {
      font-size: 15px;
      margin-bottom: 8px;
    }
    .order-panel {
      background: #fff8e1;
      border-radius: 10px;
      padding: 8px;
      margin: 8px 0;
      text-align: left;
    }
    .panel-title {
      font-weight: bold;
      color: #333;
      margin-bottom: 4px;
      font-size: 14px;
    }
    .panel-title.next {
      margin-top: 8px;
    }
    #current-list,
    #next-list {
      font-size: 14px;
      line-height: 1.6;
    }
    .person {
      display: inline-block;
      background: white;
      border: 1px solid #e0d7b5;
      border-radius: 999px;
      padding: 4px 8px;
      margin: 3px;
    }
    .notice {
      font-size: 14px;
      color: #444;
      background: #e8f5e9;
      padding: 9px;
      border-radius: 8px;
      margin: 8px 0;
      line-height: 1.6;
    }
    .toolbar button,
    .admin-panel button {
      border: none;
      background: #333;
      color: white;
      border-radius: 8px;
      padding: 8px 10px;
      margin: 3px;
      cursor: pointer;
      font-size: 13px;
    }
    .admin-panel {
      display: none;
      background: #f3e5f5;
      border-radius: 10px;
      padding: 8px;
      margin-top: 8px;
      text-align: center;
    }
    .admin-title {
      font-weight: bold;
      margin-bottom: 5px;
    }
    #bus-container {
      display: grid;
      grid-template-columns: 70px 58px 58px 48px 58px 70px;
      gap: 0;
      background: #fff;
      border: 3px solid #222;
      border-radius: 8px;
      overflow: hidden;
      opacity: .45;
      pointer-events: none;
      box-shadow: 0 4px 15px rgba(0, 0, 0, .12);
    }
    #bus-container.ready {
      opacity: 1;
      pointer-events: auto;
    }
    .cell {
      min-height: 46px;
      border-right: 1px solid #444;
      border-bottom: 1px solid #444;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      text-align: center;
      font-size: 13px;
      background: white;
    }
    .label {
      font-weight: bold;
      color: #333;
      background: #fafafa;
    }
    .seat {
      cursor: pointer;
      font-weight: bold;
    }
    .seat:hover {
      background: #e3f2fd;
    }
    .seat.occupied {
      background: #4CAF50 !important;
      color: white;
    }
    .tv {
      color: #d32f2f;
      font-weight: bold;
      background: #fff5f5;
    }
    .door {
      color: #d32f2f;
      font-weight: bold;
      background: #fff8f8;
    }
    .aisle {
      writing-mode: vertical-rl;
      letter-spacing: 8px;
      font-weight: bold;
      color: #111;
    }
    .empty {
      background: #fff;
    }
    .num-hint {
      position: absolute;
      top: 2px;
      left: 4px;
      font-size: 10px;
      color: #999;
    }
    .name-text {
      font-size: 13px;
      font-weight: bold;
      padding: 4px;
      word-break: break-all;
    }
    .legend {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      margin-top: 15px;
    }
    .legend-item {
      display: flex;
      align-items: center;
    }
    .box {
      width: 14px;
      height: 14px;
      border: 1px solid #444;
      margin-right: 6px;
    }
    .empty-box { background: white; }
    .occupied-box { background: #4CAF50; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h2 onclick="showAdminSecretly()"> 🚌  遊覽車雲端選位 </h2>
      <div id="status-text"> 正在同步資料 ...</div>
      <div id="round-box"> 目前開放中 ...</div>
      <div id="count-box"> 已選 0 位｜剩餘 0 位 </div>
      
      <div class="order-panel">
        <div class="panel-title"> ✅   目前可選名單 </div>
        <div id="current-list"></div>
        <div class="panel-title next"> ⏳   下一輪準備名單 </div>
        <div id="next-list"></div>
      </div>
      
      <div class="notice">
        請直接輸入您的姓名選位。 <br>
        若要更換座位，直接點新的空位即可。 <br>
        家人或同行者可依照上方名單順序一起準備。
      </div>
      
      <div class="toolbar">
        <button onclick="loadSeats()"> 手動刷新 </button>
      </div>

      <div class="admin-panel" id="admin-panel">
        <div class="admin-title">🛠 主辦人管理面板</div>
        <button onclick="toggleAdminMode()">開啟/關閉 強制覆寫模式</button>
        <button onclick="goToBackend()">進入進階後台管理</button>
        <div id="admin-status" style="font-size:12px; color:purple; margin-top:4px;"></div>
      </div>
    </div>

    <div id="bus-container"></div>

    <div class="legend">
      <div class="legend-item"><div class="box empty-box"></div><span>可選位置</span></div>
      <div class="legend-item"><div class="box occupied-box"></div><span>已被選取</span></div>
    </div>
  </div>

  <script>
    document.getElementById("status-text").innerText = " ✅  Netlify 連線正常 ";
    
    let isAdminAuthenticated = false; 
    let clickCount = 0;
    let clickTimer = null;

    function showAdminSecretly() {
      clickCount++;
      clearTimeout(clickTimer);
      clickTimer = setTimeout(() => { clickCount = 0; }, 2000);

      if (clickCount === 3) {
        clickCount = 0;
        let pwd = prompt("請輸入管理員認證密碼：");
        if (!pwd) return;

        document.getElementById("status-text").innerText = " 🔐 正在驗證管理員身分... ";
        
        fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ action: "verifyAdmin", password: pwd })
        })
        .then(res => res.json())
        .then(data => {
          if (data.status === "success" && data.isAdmin) {
            isAdminAuthenticated = true;
            document.getElementById("admin-panel").style.display = "block";
            document.getElementById("admin-status").innerText = "⚠️ 目前已驗證：管理員模式（可強制覆寫）";
            alert("🎉 認證成功！管理員專屬後台面板已開啟。");
            loadSeats();
          } else {
            alert("❌ 密碼錯誤，身分認證失敗！");
          }
          document.getElementById("status-text").innerText = " ✅ 系統正常 ";
        })
        .catch(() => {
          alert("網路連線超時，請重新再試");
          document.getElementById("status-text").innerText = " ❌ 連線錯誤 ";
        });
      }
    }

    // 🚌 精確對照截圖：完美對接 12 排遊覽車網格矩陣 (ID 完全符合試算表)
    const BUS_LAYOUT = [
      // 第一排
      { type: "label", text: "第一排" }, { type: "seat", id: "s11" }, { type: "seat", id: "s12" }, { type: "aisle", text: "走道" }, { type: "empty", text: "" }, { type: "empty", text: "" },
      // 空白列 (前門設施)
      { type: "empty", text: "" }, { type: "empty", text: "" }, { type: "empty", text: "" }, { type: "aisle", text: "走道" }, { type: "door", text: "前門" }, { type: "empty", text: "" },
      // 第二排
      { type: "label", text: "第二排" }, { type: "seat", id: "s21" }, { type: "seat", id: "s22" }, { type: "aisle", text: "走道" }, { type: "label", text: "領隊" }, { type: "label", text: "第三排" },
      // 第三排
      { type: "label", text: "第三排" }, { type: "seat", id: "s31" }, { type: "seat", id: "s32" }, { type: "aisle", text: "走道" }, { type: "empty", text: "" }, { type: "empty", text: "" },
      // 小電視列
      { type: "empty", text: "" }, { type: "empty", text: "" }, { type: "tv", text: "小電視" }, { type: "aisle", text: "走道" }, { type: "empty", text: "" }, { type: "label", text: "第四排" },
      // 第四排
      { type: "label", text: "第四排" }, { type: "seat", id: "s41" }, { type: "seat", id: "s42" }, { type: "aisle", text: "走道" }, { type: "seat", id: "s43" }, { type: "empty", text: "" },
      // 第五排
      { type: "label", text: "第五排" }, { type: "seat", id: "s51" }, { type: "seat", id: "s52" }, { type: "aisle", text: "走道" }, { type: "seat", id: "s53" }, { type: "label", text: "第五排" },
      // 空白列
      { type: "empty", text: "" }, { type: "empty", text: "" }, { type: "empty", text: "" }, { type: "aisle", text: "走道" }, { type: "empty", text: "" }, { type: "empty", text: "" },
      // 第六排
      { type: "label", text: "第六排" }, { type: "seat", id: "s61" }, { type: "seat", id: "s62" }, { type: "aisle", text: "走道" }, { type: "seat", id: "s63" }, { type: "label", text: "第六排" },
      // 緊急出口列
      { type: "door", text: "緊急出口" }, { type: "empty", text: "" }, { type: "tv", text: "小電視" }, { type: "aisle", text: "走道" }, { type: "seat", id: "s73" }, { type: "label", text: "第七排" },
      // 第七排
      { type: "label", text: "第七排" }, { type: "seat", id: "s71" }, { type: "seat", id: "s72" }, { type: "aisle", text: "走道" }, { type: "empty", text: "" }, { type: "empty", text: "" },
      // 第八排
      { type: "label", text: "第八排" }, { type: "seat", id: "s81" }, { type: "seat", id: "s82" }, { type: "aisle", text: "走道" }, { type: "door", text: "後門" }, { type: "empty", text: "" },
      // 第九排
      { type: "label", text: "第九排" }, { type: "seat", id: "s91" }, { type: "seat", id: "s92" }, { type: "aisle", text: "走道" }, { type: "tv", text: "小電視" }, { type: "empty", text: "" },
      // 電視列
      { type: "empty", text: "" }, { type: "empty", text: "" }, { type: "tv", text: "小電視" }, { type: "aisle", text: "走道" }, { type: "seat", id: "s93" }, { type: "label", text: "第九排" },
      // 第十排
      { type: "label", text: "第十排" }, { type: "seat", id: "s101" }, { type: "seat", id: "s102" }, { type: "aisle", text: "走道" }, { type: "seat", id: "s103" }, { type: "label", text: "第十排" },
      // 第十一排
      { type: "label", text: "第十一排" }, { type: "seat", id: "s111" }, { type: "seat", id: "s112" }, { type: "aisle", text: "走道" }, { type: "seat", id: "s113" }, { type: "label", text: "第十一排" },
      // 第十二排 (最後一排連排)
      { type: "label", text: "第十二排" }, { type: "seat", id: "s121" }, { type: "seat", id: "s122" }, { type: "seat", id: "s123" }, { type: "seat", id: "s124" }, { type: "empty", text: "" }
    ];

    function loadSeats() {
      document.getElementById("status-text").innerText = " 🔄 正在同步雲端最新選位狀態... ";
      
      fetch(API_URL)
        .then(res => res.json())
        .then(data => {
          if (data.status === "success") {
            document.getElementById("round-box").innerText = `目前開放順序：1 ～ ${data.currentStep} 號`;
            
            let currentHtml = data.currentList.map(p => `<span class="person">${p.name} (${p.group || '個人'})</span>`).join('');
            document.getElementById("current-list").innerHTML = currentHtml || " 暫無 ";
            
            let nextHtml = data.nextList.map(p => `<span class="person">${p.name}</span>`).join('');
            document.getElementById("next-list").innerHTML = nextHtml || " 暫無 ";

            let totalSeatsCount = 0;
            let occupiedCount = 0;
            Object.keys(data.seats).forEach(key => {
              totalSeatsCount++;
              if (data.seats[key].name !== "") occupiedCount++;
            });
            document.getElementById("count-box").innerText = `已選 ${occupiedCount} 位｜剩餘 ${totalSeatsCount - occupiedCount} 位`;

            const container = document.getElementById("bus-container");
            container.innerHTML = ""; 

            BUS_LAYOUT.forEach(item => {
              const div = document.createElement("div");
              div.className = `cell ${item.type}`;
              
              if (item.type === "seat") {
                const dbSeat = data.seats[item.id] || { name: "", label: "①" };
                
                // 讀取顯示標籤 (試算表內像是 "第1排1號")，如果沒撈到就顯示隱藏小號碼
                let displayNum = dbSeat.label ? dbSeat.label.replace(/第\d+排/, "") : "";
                div.innerHTML = `<span class="num-hint">${displayNum}</span>`;
                
                if (dbSeat.name !== "") {
                  div.classList.add("occupied");
                  div.innerHTML += `<span class="name-text">${dbSeat.name}</span>`;
                }
                
                div.onclick = () => handleSeatClick(item.id, dbSeat.name);
              } else {
                div.innerText = item.text || "";
              }
              container.appendChild(div);
            });

            document.getElementById("bus-container").classList.add("ready");
            document.getElementById("status-text").innerText = " ✅ 雲端選位同步成功 ";
          }
        })
        .catch(() => {
          document.getElementById("status-text").innerText = " ❌ 資料同步失敗，請點選刷新按鈕重試 ";
        });
    }

    function handleSeatClick(seatId, currentOwnerName) {
      if (currentOwnerName && !isAdminAuthenticated) {
        alert(`❌ 慢了一步！這個座位已經被「${currentOwnerName}」選走了。\n請挑選其他空位。`);
        loadSeats(); 
        return;
      }

      let msg = isAdminAuthenticated ? `【管理員覆寫模式】請輸入要指派到此座位的成員姓名：` : `請輸入您的姓名進行選位：`;
      let name = prompt(msg);
      if (!name || name.trim() === "") return;

      document.getElementById("status-text").innerText = " 💾 正在傳輸資料至雲端試算表... ";

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "selectSeat",
          seatId: seatId,
          userName: name.trim(),
          isAdmin: isAdminAuthenticated
        })
      })
      .then(res => res.json())
      .then(result => {
        if (result.status === "success") {
          alert("🎉 選位登記成功！");
          loadSeats();
        } else if (result.status === "already_taken") {
          alert(`❌ 送出失敗！此位置剛剛已被「${result.owner}」搶先一步登記了！`);
          loadSeats();
        } else {
          alert("系統提示：" + result.message);
        }
      })
      .catch(() => {
        alert("網路訊號不穩，選位可能未成功，請重新再試");
        loadSeats();
      });
    }

    function toggleAdminMode() {
      isAdminAuthenticated = !isAdminAuthenticated;
      document.getElementById("admin-status").innerText = isAdminAuthenticated ? "⚠️ 目前已驗證：管理員模式（可強制覆寫）" : "一般客人瀏覽模式";
    }

    document.getElementById("status-text").style.cursor = "pointer";

    function goToBackend() {
      alert("正在引導至試算表...");
      window.open("https://docs.google.com/spreadsheets/", "_blank");
    }

    window.onload = loadSeats;
  </script>
</body>
</html>
